<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dutch Slough · R1</title>
<style>
:root{
  --bg:#060d14;--s:#0a1520;--s2:#0d1c2a;--br:rgba(0,180,255,0.15);
  --cy:#00b4ff;--gd:#ffc843;--gn:#00e676;--rd:#ff5252;--or:#ff9800;
  --mt:rgba(0,180,255,0.5);--tx:#c8e8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:240px;height:282px;overflow-y:auto;overflow-x:hidden;background:var(--bg);color:var(--tx);font-family:'Courier New',monospace;font-size:11px;-webkit-tap-highlight-color:transparent}
body{padding:4px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:2px 4px;margin-bottom:3px}
.hdr-title{font-size:9px;font-weight:700;color:var(--cy);letter-spacing:1.5px;text-transform:uppercase;text-shadow:0 0 6px rgba(0,180,255,0.5)}
.hdr-clock{font-size:9px;color:var(--mt);letter-spacing:0.5px}
.live-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--gn);box-shadow:0 0 4px var(--gn);animation:pd 2s infinite;margin-right:3px;vertical-align:middle}
@keyframes pd{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── HERO (gage + flow) ── */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:3px}
.hero-box{background:var(--s);border:1px solid var(--br);border-radius:6px;padding:4px;text-align:center}
.hero-label{font-size:7px;color:var(--mt);letter-spacing:1px;text-transform:uppercase}
.hero-val{font-size:22px;font-weight:900;line-height:1.1}
.hero-unit{font-size:7px;color:var(--mt)}
.hero-trend{font-size:8px;margin-top:1px}
.rising{color:var(--gn)}.falling{color:var(--rd)}.holding{color:var(--mt)}
.flood{color:var(--gn)}.ebb{color:var(--rd)}

/* ── FISH SCORE ── */
.fish{background:var(--s);border:1px solid var(--br);border-radius:6px;padding:4px 6px;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.fish-icon{font-size:18px;flex-shrink:0}
.fish-body{flex:1;min-width:0}
.fish-title{font-size:10px;font-weight:700;line-height:1.2}
.fish-title.excellent{color:var(--gn)}.fish-title.good{color:var(--gd)}.fish-title.fair{color:var(--or)}
.fish-detail{font-size:7px;color:var(--mt);line-height:1.3;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── TIDE PILLS ── */
.tides{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:3px}
.tide-pill{background:var(--s);border:1px solid var(--br);border-radius:6px;padding:4px;text-align:center}
.tide-lbl{font-size:6px;color:var(--mt);letter-spacing:1px;text-transform:uppercase}
.tide-type{font-size:9px;font-weight:700;letter-spacing:0.5px}
.tide-type.H{color:var(--gd)}.tide-type.L{color:#64b5f6}
.tide-time{font-size:14px;font-weight:700}
.tide-ht{font-size:8px;color:var(--mt)}
.tide-cd{font-size:7px;color:var(--gn);letter-spacing:0.5px}

/* ── WEATHER ROW ── */
.wx{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:3px}
.wx-box{background:var(--s);border:1px solid var(--br);border-radius:6px;padding:3px;text-align:center}
.wx-label{font-size:6px;color:var(--mt);letter-spacing:0.5px;text-transform:uppercase}
.wx-val{font-size:13px;font-weight:700;line-height:1.2}
.wx-unit{font-size:7px;color:var(--mt)}
.wt-prime{color:var(--gn)}.wt-good{color:var(--gd)}.wt-cold{color:#64b5f6}.wt-warm{color:var(--or)}

/* ── ASTRO ROW ── */
.astro{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:3px}
.astro-box{background:var(--s);border:1px solid var(--br);border-radius:6px;padding:3px;text-align:center}
.astro-icon{font-size:12px}
.astro-info{font-size:8px;font-weight:700;letter-spacing:0.3px}
.astro-sub{font-size:7px;color:var(--mt)}

/* ── STATUS ── */
.status{text-align:center;font-size:7px;color:var(--mt);padding:2px;letter-spacing:0.5px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div><span class="live-dot"></span><span class="hdr-title">Dutch Slough</span></div>
  <div class="hdr-clock" id="clock">--:--</div>
</div>

<!-- HERO: GAGE + FLOW -->
<div class="hero">
  <div class="hero-box">
    <div class="hero-label">Gage Ht</div>
    <div class="hero-val" id="sv-wl" style="color:var(--cy);text-shadow:0 0 8px rgba(0,180,255,0.5)">--.-</div>
    <div class="hero-unit">ft</div>
    <div class="hero-trend" id="st-wl">&nbsp;</div>
  </div>
  <div class="hero-box">
    <div class="hero-label">Flow</div>
    <div class="hero-val" id="sv-flow" style="color:var(--gn)">----</div>
    <div class="hero-unit">ft³/s</div>
    <div class="hero-trend" id="st-flow">&nbsp;</div>
  </div>
</div>

<!-- FISHING CONDITIONS -->
<div class="fish">
  <div class="fish-icon" id="ficon">🎣</div>
  <div class="fish-body">
    <div class="fish-title" id="ftitle">Loading...</div>
    <div class="fish-detail" id="fdetail">Waiting for data...</div>
  </div>
</div>

<!-- NEXT TIDES -->
<div class="tides">
  <div class="tide-pill">
    <div class="tide-lbl">Next</div>
    <div class="tide-type" id="pn-t">--</div>
    <div class="tide-time" id="pn-time">--:--</div>
    <div class="tide-ht" id="pn-h">--</div>
    <div class="tide-cd" id="pn-cd">--</div>
  </div>
  <div class="tide-pill">
    <div class="tide-lbl">After</div>
    <div class="tide-type" id="pa-t">--</div>
    <div class="tide-time" id="pa-time">--:--</div>
    <div class="tide-ht" id="pa-h">--</div>
    <div class="tide-cd" id="pa-cd">--</div>
  </div>
</div>

<!-- WEATHER -->
<div class="wx">
  <div class="wx-box">
    <div class="wx-label">Water</div>
    <div class="wx-val" id="sv-wtemp">--</div>
    <div class="wx-unit">°F</div>
  </div>
  <div class="wx-box">
    <div class="wx-label">Air</div>
    <div class="wx-val" id="sv-air" style="color:var(--gd)">--</div>
    <div class="wx-unit">°F</div>
  </div>
  <div class="wx-box">
    <div class="wx-label">Wind</div>
    <div class="wx-val" id="sv-wind" style="color:var(--mt);font-size:11px">--</div>
    <div class="wx-unit" id="sv-gust">&nbsp;</div>
  </div>
</div>

<!-- SUN / MOON -->
<div class="astro">
  <div class="astro-box">
    <div class="astro-icon" style="color:var(--gd)">☀</div>
    <div class="astro-info" id="sun-info" style="color:var(--gd)">--:-- / --:--</div>
  </div>
  <div class="astro-box">
    <div class="astro-icon" id="moon-icon">🌙</div>
    <div class="astro-info" id="moon-info" style="color:#c8c0ff">--</div>
    <div class="astro-sub" id="moon-pct">--%</div>
  </div>
</div>

<!-- STATUS -->
<div class="status" id="status">Connecting...</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────
const USGS_SITE='11313433',NOAA_PRED='9415053',NOAA_PRED_6MIN='9415144',NOAA_WX='9415144';
const NOAA_API='https://api.tidesandcurrents.noaa.gov/api/prod/datagetter';
const USGS_IV='https://waterservices.usgs.gov/nwis/iv/';
const JERSEY_PC_OFFSET=1.7;
const LAT=37.987,LON=-121.642;

// ── HELPERS ────────────────────────────────────────────────────────
function ymd(d){return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function parseT(s){const[dp,tp]=s.split(' ');const[y,mo,d]=dp.split('-').map(Number);const[h,mi]=tp.split(':').map(Number);return new Date(y,mo-1,d,h,mi);}
function f12(d){let h=d.getHours(),m=d.getMinutes(),a=h>=12?'p':'a';h=h%12||12;return`${h}:${String(m).padStart(2,'0')}${a}`;}
function cdStr(ms){const diff=ms-Date.now();if(diff<0)return'past';const mn=Math.floor(diff/60000),hr=Math.floor(mn/60),mi=mn%60;return hr>0?`${hr}h${mi}m`:`${mi}m`;}

// ── CLOCK ──────────────────────────────────────────────────────────
function tick(){const n=new Date();let h=n.getHours(),m=n.getMinutes(),a=h>=12?'PM':'AM';h=h%12||12;document.getElementById('clock').textContent=`${h}:${String(m).padStart(2,'0')} ${a}`;}
tick();setInterval(tick,1000);

// ── FETCH: USGS ───────────────────────────────────────────────────
async function fetchUSGS(p,per){
  const u=`${USGS_IV}?sites=${USGS_SITE}&parameterCd=${p}&format=json&period=${per}&siteStatus=all`;
  const r=await fetch(u);if(!r.ok)throw new Error('USGS '+r.status);
  const d=await r.json();
  for(const ts of d.value.timeSeries)return ts.values[0].value.map(v=>({t:new Date(v.dateTime),v:parseFloat(v.value)})).filter(p=>!isNaN(p.v)&&p.v>-9990);
  return[];
}
async function safeUSGS(p,per){try{return await fetchUSGS(p,per);}catch(e){return[];}}

// ── FETCH: NOAA HI/LO ────────────────────────────────────────────
async function fetchHiLo(begin,end){
  const u=new URL(NOAA_API);
  Object.entries({station:NOAA_PRED,product:'predictions',begin_date:begin,end_date:end,datum:'MLLW',units:'english',time_zone:'lst_ldt',interval:'hilo',format:'json'}).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u);const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return(d.predictions||[]).map(p=>({...p,date:parseT(p.t),h:parseFloat(p.v)}));
}
async function safeHiLo(b,e){try{return await fetchHiLo(b,e);}catch(e){return[];}}

// ── FETCH: WEATHER ────────────────────────────────────────────────
async function fetchWx(){
  const results={};
  for(const prod of['water_temperature','air_temperature','wind']){
    try{
      const u=new URL(NOAA_API);
      Object.entries({station:NOAA_WX,product:prod,date:'latest',units:'english',time_zone:'lst_ldt',format:'json'}).forEach(([k,v])=>u.searchParams.set(k,v));
      const r=await fetch(u);const d=await r.json();
      if(d.data&&d.data.length)results[prod]=d.data[d.data.length-1];
    }catch(e){}
  }
  return results;
}

// ── SUN (NOAA algorithm) ──────────────────────────────────────────
function calcSun(date){
  const JD=(date/86400000)+2440587.5,n=JD-2451545.0+0.0008,Js=n-LON/360;
  const M=(357.5291+0.98560028*Js)%360,Mr=M*Math.PI/180;
  const C=1.9148*Math.sin(Mr)+0.02*Math.sin(2*Mr)+0.0003*Math.sin(3*Mr);
  const lam=(M+C+180+102.9372)%360;
  const Jt=2451545+Js+0.0053*Math.sin(Mr)-0.0069*Math.sin(2*lam*Math.PI/180);
  const sinD=Math.sin(lam*Math.PI/180)*Math.sin(23.4397*Math.PI/180);
  const cosH=-(Math.sin(-0.833*Math.PI/180)+Math.sin(LAT*Math.PI/180)*sinD)/(Math.cos(LAT*Math.PI/180)*Math.sqrt(1-sinD*sinD));
  if(Math.abs(cosH)>1)return null;
  const H=Math.acos(cosH)*180/Math.PI;
  const toD=jd=>new Date((jd-2440587.5)*86400000);
  return{rise:toD(Jt-H/360),set:toD(Jt+H/360)};
}

// ── MOON (Meeus) ──────────────────────────────────────────────────
function calcMoon(date){
  const JD=(date.getTime()/86400000)+2440587.5,d=JD-2451545;
  const Ms=((357.529+0.98560028*d)%360)*Math.PI/180;
  const Lm=((218.316+13.176396*d)%360)*Math.PI/180;
  const Mm=((134.963+13.064993*d)%360)*Math.PI/180;
  const lon=218.316+13.176396*d+6.289*Math.sin(Mm)-1.274*Math.sin(2*Lm-Mm)+0.658*Math.sin(2*Lm)-0.214*Math.sin(2*Mm)-0.110*Math.sin(Ms);
  const phase=((lon-((280.460+0.9856474*d)%360)+360)%360)/360;
  const illum=Math.round((1-Math.cos(phase*2*Math.PI))/2*100);
  let name,emoji;
  if(phase<0.0625){name='New';emoji='🌑';}
  else if(phase<0.1875){name='Wax Cres';emoji='🌒';}
  else if(phase<0.3125){name='1st Qtr';emoji='🌓';}
  else if(phase<0.4375){name='Wax Gib';emoji='🌔';}
  else if(phase<0.5625){name='Full';emoji='🌕';}
  else if(phase<0.6875){name='Wan Gib';emoji='🌖';}
  else if(phase<0.8125){name='Last Qtr';emoji='🌗';}
  else if(phase<0.9375){name='Wan Cres';emoji='🌘';}
  else{name='New';emoji='🌑';}
  return{phase,illum,name,emoji};
}

// ── FISHING SCORE ─────────────────────────────────────────────────
function evalFishing(hilo,gage,flow,wt,wind){
  const now=new Date();
  const past=hilo.filter(p=>p.date<=now).sort((a,b)=>b.date-a.date);
  const future=hilo.filter(p=>p.date>now).sort((a,b)=>a.date-b.date);
  const last=past[0],next=future[0];
  const minsTo=next?(next.date-now)/60000:999;
  const minsSince=last?(now-last.date)/60000:999;
  const incoming=last?.type==='L'&&next?.type==='H';
  const outgoing=last?.type==='H'&&next?.type==='L';
  let score=0,detail='';

  if(minsTo<75&&next?.type==='L'){score+=4;detail=`Slack low ${Math.round(minsTo)}m`;}
  else if(minsSince<75&&last?.type==='L'){score+=4;detail=`${Math.round(minsSince)}m past low`;}
  else if(incoming){score+=2;detail='Flood tide';}
  else if(outgoing){score+=2;detail='Ebb tide';}
  else{detail='Mid-tide';}

  if(gage!=null){if(gage>5&&gage<8)score+=2;else if(gage>=8)score-=1;}
  if(flow!=null){const a=Math.abs(flow);if(a<1000)score+=1;else if(a>5000)score-=1;}
  if(wt!=null){if(wt>=65&&wt<=80)score+=3;else if(wt>=60)score+=1;else if(wt<60)score-=1;}
  if(wind!=null){if(wind<10)score+=1;else if(wind>20)score-=1;}

  const moon=calcMoon(now);
  if(moon.illum>=90)score+=2;else if(moon.illum<=10)score+=1;

  if(wt!=null)detail+=` · ${wt.toFixed(0)}°F`;
  if(flow!=null)detail+=` · ${Math.abs(flow)>=1000?(flow/1000).toFixed(1)+'k':Math.round(Math.abs(flow))}cfs`;

  let rating,icon,title;
  if(score>=7){rating='excellent';icon='🔥';title='PRIME — GO NOW';}
  else if(score>=4){rating='excellent';icon='🔥';title='Excellent';}
  else if(score>=2){rating='good';icon='✅';title='Good';}
  else{rating='fair';icon='🎣';title='Fair — Slow';}

  document.getElementById('ficon').textContent=icon;
  const ft=document.getElementById('ftitle');ft.className=`fish-title ${rating}`;ft.textContent=title;
  document.getElementById('fdetail').textContent=detail;
}

// ── RENDER ─────────────────────────────────────────────────────────
function renderGage(pts){
  if(!pts.length)return null;
  const l=pts[pts.length-1];
  document.getElementById('sv-wl').textContent=l.v.toFixed(2);
  const el=document.getElementById('st-wl');
  if(pts.length>1){
    const prev=pts[pts.length-2].v,diff=l.v-prev;
    if(Math.abs(diff)<0.01)el.innerHTML='<span class="holding">▬ Steady</span>';
    else if(diff>0)el.innerHTML=`<span class="rising">▲ Rising</span>`;
    else el.innerHTML=`<span class="falling">▼ Falling</span>`;
  }
  return l.v;
}

function renderFlow(pts){
  if(!pts.length)return null;
  const l=pts[pts.length-1];
  const a=Math.abs(l.v);
  document.getElementById('sv-flow').textContent=a>=1000?`${(l.v/1000).toFixed(1)}k`:String(Math.round(l.v));
  document.getElementById('sv-flow').style.color=l.v>=0?'var(--gn)':'var(--rd)';
  document.getElementById('st-flow').innerHTML=l.v>=0?'<span class="flood">▶ Flood</span>':'<span class="ebb">◀ Ebb</span>';
  return l.v;
}

function renderWx(wx){
  let wt=null,wind=null;
  const w=wx['water_temperature'];
  if(w){
    wt=parseFloat(w.v);
    const el=document.getElementById('sv-wtemp');
    el.textContent=Math.round(wt);
    el.className='wx-val '+(wt>=65&&wt<=80?'wt-prime':wt>=60?'wt-good':wt<60?'wt-cold':'wt-warm');
  }
  const a=wx['air_temperature'];
  if(a)document.getElementById('sv-air').textContent=Math.round(parseFloat(a.v));
  const wi=wx['wind'];
  if(wi){
    wind=Math.round(parseFloat(wi.s)*1.15078);
    const gust=Math.round(parseFloat(wi.g)*1.15078);
    document.getElementById('sv-wind').textContent=`${wind}mph`;
    document.getElementById('sv-gust').textContent=`g${gust} ${wi.dr}`;
  }
  return{wt,wind};
}

function renderTides(hilo){
  const now=new Date();
  const upcoming=hilo.filter(p=>p.date>now).sort((a,b)=>a.date-b.date);
  function set(id,p){
    if(!p)return;
    document.getElementById(`p${id}-t`).textContent=p.type==='H'?'HIGH':'LOW';
    document.getElementById(`p${id}-t`).className=`tide-type ${p.type}`;
    document.getElementById(`p${id}-time`).textContent=f12(p.date);
    document.getElementById(`p${id}-h`).textContent=`${p.h.toFixed(1)} ft`;
    document.getElementById(`p${id}-cd`).textContent=cdStr(p.date);
  }
  set('n',upcoming[0]);set('a',upcoming[1]);
  return hilo;
}

function renderAstro(){
  const noon=new Date();noon.setUTCHours(12,0,0,0);
  const sun=calcSun(noon);
  if(sun)document.getElementById('sun-info').textContent=`${f12(sun.rise)} / ${f12(sun.set)}`;
  const moon=calcMoon(new Date());
  document.getElementById('moon-icon').textContent=moon.emoji;
  document.getElementById('moon-info').textContent=moon.name;
  document.getElementById('moon-pct').textContent=`${moon.illum}%`;
}

// ── MAIN LOAD ─────────────────────────────────────────────────────
async function loadAll(){
  document.getElementById('status').textContent='Fetching...';
  const today=ymd(new Date()),tmrw=ymd(new Date(Date.now()+86400000));
  try{
    const[g,f,hilo,wx]=await Promise.all([
      safeUSGS('00065','P1D'),
      safeUSGS('00060','P1D'),
      safeHiLo(today,tmrw),
      fetchWx().catch(()=>({}))
    ]);
    const gage=renderGage(g);
    const flow=renderFlow(f);
    const{wt,wind}=renderWx(wx);
    const today2=ymd(new Date());
    const hiloToday=hilo.filter(p=>ymd(p.date)===today2);
    renderTides(hiloToday);
    evalFishing(hiloToday,gage,flow,wt,wind);
    renderAstro();
    document.getElementById('status').textContent=`Live · ${new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}`;
  }catch(e){
    document.getElementById('status').textContent=`Err: ${e.message}`;
  }
}

// Countdown refresh
setInterval(()=>{
  ['pn-cd','pa-cd'].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&el.dataset.ms)el.textContent=cdStr(parseInt(el.dataset.ms));
  });
},30000);

// 10-min auto-refresh (lighter than full version)
setInterval(loadAll,10*60*1000);

loadAll();
</script>
</body>
</html>
